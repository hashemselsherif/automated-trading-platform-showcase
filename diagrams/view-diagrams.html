<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automated Trading System Diagrams</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 320px;
      background: #161b22;
      border-right: 1px solid #30363d;
      padding: 24px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar h1 {
      color: #58a6ff;
      font-size: 20px;
      margin-bottom: 10px;
    }

    .sidebar p {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .sidebar .part-title {
      color: #8b949e;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 18px 0 6px;
    }

    .sidebar a {
      display: block;
      color: #c9d1d9;
      text-decoration: none;
      padding: 8px 12px;
      margin-bottom: 4px;
      border-radius: 8px;
      font-size: 14px;
    }

    .sidebar a:hover {
      background: #21262d;
      color: #58a6ff;
    }

    main {
      flex: 1;
      padding: 28px;
      max-width: 1100px;
    }

    .lead {
      color: #8b949e;
      margin-bottom: 24px;
    }

    .lead a { color: #58a6ff; }

    section {
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      background: #0d1117;
    }

    h2 {
      color: #58a6ff;
      margin-bottom: 10px;
      font-size: 24px;
    }

    section p {
      color: #8b949e;
      margin-bottom: 18px;
    }

    section p a { color: #58a6ff; }
    section code {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 13px;
    }

    .diagram {
      background: #fff;
      border-radius: 10px;
      padding: 16px;
      overflow-x: auto;
    }

    .notice {
      border: 1px solid #30363d;
      border-left: 3px solid #d29922;
      border-radius: 8px;
      padding: 18px 20px;
      background: #161b22;
    }
    .notice code {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 5px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>System Diagrams</h1>
      <p>Architecture, orchestration, risk, execution, and operations.</p>
      <nav id="nav"></nav>
    </aside>
    <main id="main"></main>
  </div>

  <script>
    // This viewer renders ../diagrams/DIAGRAMS.md directly so the Markdown file
    // is the single source of truth. Diagrams are never duplicated here.
    const SOURCE = "DIAGRAMS.md";

    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Minimal inline Markdown for descriptions: links, bold, inline code.
    function inlineMd(text) {
      let out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
      out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, t, u) => `<a href="${u}">${t}</a>`);
      out = out.replace(/\*\*([^*]+)\*\*/g, (_, b) => `<strong>${b}</strong>`);
      return out;
    }

    function slug(s) {
      return s.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
    }

    // Parse DIAGRAMS.md into { lead, parts: [{ title, diagrams: [{ title, desc, code }] }] }.
    function parseDoc(md) {
      const lines = md.split("\n");
      const parts = [];
      const leadLines = [];
      let curPart = null, curDia = null, inCode = false, code = [], seenPart = false;

      for (const line of lines) {
        const t = line.trim();
        if (inCode) {
          if (t === "```") { inCode = false; if (curDia) curDia.code = code.join("\n"); }
          else code.push(line);
          continue;
        }
        if (t.startsWith("```mermaid")) { inCode = true; code = []; continue; }
        if (t === "---") continue;
        if (line.startsWith("### ")) {
          curDia = { title: line.slice(4).trim(), desc: "", code: "" };
          if (!curPart) { curPart = { title: "", diagrams: [] }; parts.push(curPart); }
          curPart.diagrams.push(curDia);
          continue;
        }
        if (line.startsWith("## ")) {
          curPart = { title: line.slice(3).trim(), diagrams: [] };
          parts.push(curPart);
          curDia = null;
          seenPart = true;
          continue;
        }
        if (line.startsWith("# ")) continue; // document title
        if (!seenPart && t) { leadLines.push(t); continue; }
        if (curDia && !curDia.code && t) {
          curDia.desc = curDia.desc ? curDia.desc + " " + t : t;
        }
      }
      return { lead: leadLines.join(" "), parts };
    }

    function render(doc) {
      const nav = document.getElementById("nav");
      const main = document.getElementById("main");

      if (doc.lead) {
        const lead = document.createElement("p");
        lead.className = "lead";
        lead.innerHTML = inlineMd(doc.lead);
        main.appendChild(lead);
      }

      for (const part of doc.parts) {
        if (!part.diagrams.length) continue;
        if (part.title) {
          const pt = document.createElement("div");
          pt.className = "part-title";
          pt.textContent = part.title;
          nav.appendChild(pt);
        }
        for (const dia of part.diagrams) {
          const id = slug(dia.title);

          const a = document.createElement("a");
          a.href = "#" + id;
          a.textContent = dia.title;
          nav.appendChild(a);

          const section = document.createElement("section");
          section.id = id;

          const h2 = document.createElement("h2");
          h2.textContent = dia.title;
          section.appendChild(h2);

          if (dia.desc) {
            const p = document.createElement("p");
            p.innerHTML = inlineMd(dia.desc);
            section.appendChild(p);
          }

          if (dia.code) {
            const wrap = document.createElement("div");
            wrap.className = "diagram";
            const m = document.createElement("div");
            m.className = "mermaid";
            m.textContent = dia.code; // textContent preserves <br/> for Mermaid
            wrap.appendChild(m);
            section.appendChild(wrap);
          }

          main.appendChild(section);
        }
      }

      mermaid.initialize({
        startOnLoad: false,
        theme: "default",
        securityLevel: "loose",
        flowchart: { htmlLabels: true, curve: "basis" }
      });
      mermaid.run({ querySelector: ".mermaid" });
    }

    function showNotice() {
      const main = document.getElementById("main");
      main.innerHTML =
        '<div class="notice">' +
        "<h2>Serve this folder to view the diagrams</h2>" +
        "<p>This page renders <code>DIAGRAMS.md</code> at runtime, which the browser blocks when opened directly from disk (<code>file://</code>).</p>" +
        "<p>Run a local server from this folder and open the page over <code>http://</code>:</p>" +
        "<p><code>python3 -m http.server</code> &nbsp; then open &nbsp; <code>http://localhost:8000/view-diagrams.html</code></p>" +
        "<p>Or simply view <code>DIAGRAMS.md</code> on GitHub, which renders the Mermaid diagrams natively.</p>" +
        "</div>";
    }

    fetch(SOURCE)
      .then((r) => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then((md) => render(parseDoc(md)))
      .catch(() => showNotice());
  </script>
</body>
</html>
